<!DOCTYPE html>
<html>
<head>
  <title>NYC Apartment Evaluator Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      padding: 20px;
      max-width: 600px;
      margin: 0 auto;
    }
    h1 { font-size: 20px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input[type="text"], textarea { 
      width: 100%; 
      padding: 8px; 
      border: 1px solid #ccc; 
      border-radius: 4px; 
    }
    button {
      background-color: #4285f4;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background-color: #357abd; }
    .status { margin-top: 10px; color: green; font-weight: bold; }
    .help-text { font-size: 12px; color: #666; margin-top: 5px; }
  </style>
</head>
<body>
  <h1>Settings</h1>
  <div class="form-group">
    <label for="apiKey">Google Maps API Key</label>
    <input type="text" id="apiKey" placeholder="AIzaSy...">
    <div class="help-text">
      Required for Commute and Geocoding. <a href="https://developers.google.com/maps/documentation/javascript/get-api-key" target="_blank">Get a key here</a>.
      Must have Geocoding API and Distance Matrix API enabled.
    </div>
  </div>

  <div class="form-group">
    <label for="offices">Office Locations (JSON format)</label>
    <textarea id="offices" rows="10" placeholder='[
  { "name": "Office 1", "address": "123 Main St, New York, NY" }
]'></textarea>
    <div class="help-text">Enter a valid JSON array of office objects with 'name' and 'address'.</div>
  </div>

  <button id="save">Save Settings</button>
  <div id="status" class="status"></div>

  <script src="options.js"></script>
</body>
</html>
